<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - PoPular Gym</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
    <h1>Criar Conta</h1>
    <p>Já tem conta? <a href="login.html">Entrar</a></p>

    <form id="form-cadastro">
        <div class="campo">
        <label for="name">Nome Completo:</label> 
        <input type="text" id="name" placeholder="Insira seu nome completo">
        <span class="erro" id="erro-name"></span>
    </div>
        <div class="campo">
        <label for="email">E-mail:</label> 
        <input type="email" id="email" placeholder="Digite seu E-mail">
        <span class="erro" id="erro-email"></span>
    </div>
    <div class="campo">
        <label for="senha">Senha:</label> 
        <input type="password" id="senha" placeholder="Mínimo 6 caracteres">
        <span class="erro" id="erro-senha"></span>
    </div>
    <div class="campo">
        <label for="confirmar-senha">Confirmar senha:</label>
        <input type="password" id="confirmar-senha" placeholder="Repita a senha">
        <span class="erro" id="erro-confirmar"></span>
    </div>

    <button type="submit"> Criar conta</button>

    </form>

    <div id="sucesso" class="oculto">
        Conta criada com sucesso! <a href="login.html">Ir para o login</a>
    </div>
</div>

    <script src="../js/cadastro.js"></script>
</body>
</html>
