<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PoPular Gym</title>
    <link rel="stylesheet" href="../css/style.css">

</head>
<body>
    <div class="container">
    <h1>PoPular Gym</h1>
    <p>A academia do seu jeito!!</p>

    <form id="form-login">
        <div class="campo">
            <label for="email">E-mail:</label> 
            <input type="email" id="inEmail" placeholder="Digite seu e-mail">
            <span class="erro" id="erro-email"></span>
        </div>

        <div class="campo">
            <label for="senha">Senha:</label>
            <input type="password" id="inSenha" placeholder="Insira sua senha">
            <span class="erro" id="erro-senha"></span>
        </div>

        <button type="submit"> Login</button>

    </form>

    <div id="sucesso" class="oculto">
        Conta logada com sucesso!
    </div>

    </div>

    <script src="../js/login.js"></script>
</body>
</html>
